site_name: Daniil Latanov
site_description: Персональный сайт — DevOps, разработка, проекты
site_author: Daniil Latanov
site_url: https://tsukuyomiwalk.github.io/devops-lab-latanov/

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    logo: material/code-tags
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Главная: index.md
  - О себе: about.md
  - Проекты: projects.md
  - Контакты: contacts.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Tsukuyomiwalk
      name: GitHub
    - icon: fontawesome/brands/telegram
      link: https://t.me/okniceok
      name: Telegram

copyright: "&copy; 2026 Daniil Latanov — ITMO University"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji

plugins:
  - search
